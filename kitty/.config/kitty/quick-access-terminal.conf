# Dim the dropdown when it loses focus, restore it when focused again.
# dynamic_background_opacity must be on for runtime opacity changes to work;
# the watcher (focus_opacity.py) does the actual dimming. Both are scoped to
# this dropdown instance only, so normal kitty windows are unaffected.
kitty_override dynamic_background_opacity=yes
kitty_override watcher=focus_opacity.py
